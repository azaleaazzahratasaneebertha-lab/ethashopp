<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethaalbumshop - Music Album Store</title>
    <style>
        /* --- CSS: Gaya & Desain Tampilan Dark Mode Premium --- */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #1db954; /* Hijau Musik Estetis */
            --text-color: #ffffff;
            --text-muted: #a7a7a7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            background-color: #000000;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #282828;
        }

        header h1 {
            margin: 0;
            font-size: 2.3rem;
            letter-spacing: 3px;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        header p {
            margin: 10px 0 0 0;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 30px;
        }

        /* Responsif untuk Layar HP */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Grid Katalog Album */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .album-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background-color 0.3s, transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .album-card:hover {
            background-color: #282828;
            transform: translateY(-5px);
        }

        /* Desain Kotak Sampul Kaset/CD */
        .cover-art {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        .album-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .album-info p {
            margin: 0 0 15px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .price-tag {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .btn-add {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-add:hover {
            background-color: #1ed760;
            transform: scale(1.02);
        }

        /* Panel Keranjang Belanja */
        .cart-panel {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            height: fit-content;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .cart-panel h2 {
            margin-top: 0;
            font-size: 1.4rem;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .cart-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #282828;
            font-size: 0.95rem;
        }

        .cart-item-name {
            max-width: 110px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-remove {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-remove:hover {
            background-color: #ff3333;
        }

        .total-box {
            margin-top: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .btn-checkout {
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 12px;
            width: 100%;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .btn-checkout:hover {
            background-color: var(--accent-color);
            color: #000;
        }
    </style>
</head>
<body>

    <!-- --- HEADER STRUKTUR --- -->
    <header>
        <h1>Ethaalbumshop</h1>
        <p>Koleksi Album Random Pilihan Terbaik & Original</p>
    </header>

    <div class="main-container">
        <!-- Katalog Tempat Produk Tampil -->
        <div class="album-grid" id="albumGrid">
            <!-- Data dari database javascript akan di-render di sini -->
        </div>

        <!-- Keranjang Belanja -->
        <div class="cart-panel">
            <h2>Keranjang Kamu</h2>
            <ul id="cartItems" class="cart-list">
                <!-- Item masuk lewat fungsi javascript -->
            </ul>
            <div class="total-box">
                <span>Total:</span>
                <span id="totalPrice">Rp 0</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">Proses Pembayaran</button>
        </div>
    </div>

    <!-- --- JAVASCRIPT: DATABASE & LOGIKA APLIKASI --- -->
    <script>
        // 1. DATABASE PRODUK (Berisi 5 Album Musik Random Populer)
        const databaseProduk = [
            {
                id: 1,
                name: "Midnights",
                artist: "Taylor Swift",
                price: 385000,
                bg_color: "linear-gradient(45deg, #0f2027, #203a43, #2c5364)"
            },
            {
                id: 2,
                name: "SOUR",
                artist: "Olivia Rodrigo",
                price: 320000,
                bg_color: "linear-gradient(135deg, #b19ffb, #dfbdfc)"
            },
            {
                id: 3,
                name: "BE (Deluxe Edition)",
                artist: "BTS",
                price: 490000,
                bg_color: "linear-gradient(45deg, #232526, #414345)"
            },
            {
                id: 4,
                name: "After Hours",
                artist: "The Weeknd",
                price: 425000,
                bg_color: "linear-gradient(135deg, #8a0000, #2b0000)"
            },
            {
                id: 5,
                name: "Happier Than Ever",
                artist: "Billie Eilish",
                price: 399000,
                bg_color: "linear-gradient(45deg, #e6d5b8, #b3a388)"
            }
        ];

        let keranjang = [];
        let totalHarga = 0;

        // 2. FUNGSI UNTUK MENAMPILKAN PRODUK DARI DATABASE KE WEB
        function tampilkanKatalog() {
            const albumGrid = document.getElementById('albumGrid');
            albumGrid.innerHTML = ''; // bersihkan kontainer

            databaseProduk.forEach((produk) => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <div class="cover-art" style="background: ${produk.bg_color}">VINYL / CD</div>
                    <div class="album-info">
                        <h3 title="${produk.name}">${produk.name}</h3>
                        <p>${produk.artist}</p>
                        <div class="price-tag">Rp ${produk.price.toLocaleString('id-ID')}</div>
                    </div>
                    <button class="btn-add" onclick="tambahKeKeranjang('${produk.name}', ${produk.price})">+ Keranjang</button>
                `;
                albumGrid.appendChild(card);
            });
        }

        // 3. LOGIKA UNTUK KERANJANG BELANJA
        function tambahKeKeranjang(namaAlbum, harga) {
            keranjang.push({ nama: namaAlbum, harga: harga });
            perbaruiKeranjang();
        }

        function hapusDariKeranjang(index) {
            keranjang.splice(index, 1);
            perbaruiKeranjang();
        }

        function perbaruiKeranjang() {
            const elemenList = document.getElementById('cartItems');
            const elemenTotal = document.getElementById('totalPrice');
            
            elemenList.innerHTML = '';
            totalHarga = 0;

            keranjang.forEach((item, index) => {
                totalHarga += item.harga;

                const li = document.createElement('li');
                li.className = 'cart-item';
                li.innerHTML = `
                    <span class="cart-item-name" title="${item.nama}">${item.nama}</span>
                    <div>
                        <span style="margin-right: 10px; font-weight: 500;">Rp ${item.harga.toLocaleString('id-ID')}</span>
                        <button class="btn-remove" onclick="hapusDariKeranjang(${index})">x</button>
                    </div>
                `;
                elemenList.appendChild(li);
            });

            elemenTotal.innerText = `Rp ${totalHarga.toLocaleString('id-ID')}`;
        }

        // 4. FUNGSI CHECKOUT TOMBOL BAYAR
        function checkout() {
            if (keranjang.length === 0) {
                alert("Keranjang belanjaan Ethaalbumshop kamu masih kosong!");
            } else {
                alert(`Pesanan Berhasil!\nTotal yang harus dibayar: Rp ${totalHarga.toLocaleString('id-ID')}\n\nTerima kasih sudah berbelanja di Ethaalbumshop!`);
                keranjang = [];
                perbaruiKeranjang();
            }
        }

        // Jalankan fungsi tampilkan katalog secara otomatis saat halaman web dibuka
        tampilkanKatalog();
    </script>
</body>
</html>
